<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Triumph 660 — Moteur trois cylindres · Éclaté cinématique</title>
<style>
  :root{
    --gold:#d4af37;
    --gold-dim:#9a7d2e;
    --ink:#e8e6e0;
    --ink-dim:#8a8880;
    --bg:#050507;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-user-select:none;user-select:none}
  #app{position:fixed;inset:0}
  canvas#c{display:block;width:100%;height:100%;touch-action:none;cursor:grab}
  canvas#c.dragging{cursor:grabbing}

  #vignette{position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(ellipse 92% 82% at 50% 44%, transparent 52%, rgba(0,0,0,.6) 100%)}

  /* ------- HUD ------- */
  .hud{position:absolute;pointer-events:none;z-index:5;transition:opacity .6s ease}
  body.cinema .hud{opacity:0}
  #title{top:28px;left:32px}
  #title h1{font-size:clamp(17px,2.2vw,26px);letter-spacing:.3em;font-weight:800;color:var(--ink)}
  #title h1 b{color:var(--gold);font-weight:800}
  #title p{margin-top:6px;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-dim)}
  #title .rule{width:64px;height:2px;background:linear-gradient(90deg,var(--gold),transparent);margin-top:12px}
  #title a{pointer-events:auto;color:var(--ink-dim);font-size:11px;letter-spacing:.14em;
    text-transform:uppercase;text-decoration:none;display:inline-block;margin-top:14px;
    border-bottom:1px solid rgba(212,175,55,.3);padding-bottom:2px}
  #title a:hover{color:var(--gold)}

  #help{left:32px;bottom:28px;display:flex;flex-direction:column;gap:8px;font-size:12.5px;color:var(--ink-dim)}
  #help .pill{display:flex;align-items:center;gap:10px}
  #help .key{display:inline-flex;align-items:center;justify-content:center;min-width:34px;height:24px;
    padding:0 8px;border:1px solid rgba(212,175,55,.35);border-radius:6px;color:var(--gold);
    font-size:12px;background:rgba(212,175,55,.06)}

  #readout{right:96px;bottom:30px;text-align:right}
  #readout .big{font-size:30px;font-weight:200;color:var(--ink);font-variant-numeric:tabular-nums}
  #readout .big b{color:var(--gold);font-weight:600}
  #readout .sub{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-dim);margin-top:2px}

  /* boutons */
  #btns{position:absolute;top:28px;right:32px;display:flex;gap:10px;z-index:8}
  body.cinema #btns{opacity:0;pointer-events:none}
  #btns button{pointer-events:auto;background:rgba(10,10,14,.72);border:1px solid rgba(212,175,55,.35);
    color:var(--ink);font-size:12px;letter-spacing:.12em;text-transform:uppercase;padding:10px 16px;
    border-radius:8px;cursor:pointer;backdrop-filter:blur(8px);transition:all .2s}
  #btns button:hover{border-color:var(--gold);color:var(--gold)}
  #btns button.on{background:rgba(212,175,55,.16);border-color:var(--gold);color:var(--gold)}

  /* curseur vertical éclaté */
  #slider{position:absolute;right:32px;top:50%;transform:translateY(-50%);height:min(46vh,380px);width:36px;
    display:flex;flex-direction:column;align-items:center;z-index:8;transition:opacity .6s}
  body.cinema #slider{opacity:0;pointer-events:none}
  #slider .lab{font-size:10px;letter-spacing:.2em;color:var(--ink-dim);text-transform:uppercase;
    writing-mode:vertical-rl;margin-bottom:10px}
  #slider .track{position:relative;flex:1;width:3px;background:rgba(232,230,224,.14);border-radius:2px;cursor:pointer}
  #slider .fill{position:absolute;bottom:0;left:0;width:100%;background:linear-gradient(180deg,var(--gold),var(--gold-dim));border-radius:2px}
  #slider .knob{position:absolute;left:50%;width:15px;height:15px;border-radius:50%;background:var(--gold);
    transform:translate(-50%,50%);box-shadow:0 0 12px rgba(212,175,55,.6);cursor:grab}

  /* info-bulle */
  #tip{position:absolute;pointer-events:none;z-index:12;background:rgba(8,8,12,.88);border:1px solid rgba(212,175,55,.4);
    border-radius:8px;padding:8px 12px;font-size:12.5px;color:var(--ink);backdrop-filter:blur(6px);
    transform:translate(14px,-30px);opacity:0;transition:opacity .15s;white-space:nowrap}
  #tip b{color:var(--gold);font-weight:600}
  #tip .rep{font-size:10.5px;color:var(--ink-dim);letter-spacing:.1em;margin-top:2px}

  /* fiche pièce */
  #card{position:absolute;right:96px;top:96px;width:300px;z-index:11;background:rgba(8,8,12,.9);
    border:1px solid rgba(212,175,55,.4);border-radius:12px;padding:20px 22px;backdrop-filter:blur(10px);
    transform:translateX(24px);opacity:0;pointer-events:none;transition:all .3s ease}
  #card.show{transform:none;opacity:1;pointer-events:auto}
  #card h3{font-size:15px;color:var(--gold);letter-spacing:.06em;margin-bottom:2px;padding-right:24px}
  #card .rep{font-size:10.5px;color:var(--ink-dim);letter-spacing:.18em;text-transform:uppercase}
  #card p{font-size:12.5px;line-height:1.55;color:var(--ink);margin-top:10px}
  #card .mat{margin-top:10px;font-size:11px;color:var(--ink-dim)}
  #card .mat b{color:var(--ink);font-weight:600}
  #card .x{position:absolute;top:10px;right:14px;cursor:pointer;color:var(--ink-dim);font-size:18px;line-height:1}
  #card .x:hover{color:var(--gold)}

  /* mode cinéma */
  .bar{position:absolute;left:0;width:100%;height:0;background:#000;z-index:20;transition:height 1.1s cubic-bezier(.7,0,.3,1)}
  #barTop{top:0}#barBot{bottom:0}
  body.cinema .bar{height:11vh}
  #cineTitle{position:absolute;bottom:13.5vh;left:0;width:100%;text-align:center;z-index:21;
    font-size:13px;letter-spacing:.5em;text-transform:uppercase;color:var(--gold);opacity:0;transition:opacity 1.2s}
  body.cinema #cineTitle{opacity:.9}
  #cineStop{position:absolute;top:calc(11vh + 18px);right:32px;z-index:22;opacity:0;pointer-events:none;transition:opacity .8s}
  body.cinema #cineStop{opacity:1;pointer-events:auto}
  #cineStop button{background:none;border:1px solid rgba(212,175,55,.4);color:var(--gold);border-radius:8px;
    padding:8px 14px;font-size:11px;letter-spacing:.18em;text-transform:uppercase;cursor:pointer}

  #loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:30;
    background:var(--bg);flex-direction:column;gap:18px;transition:opacity .8s}
  #loading.done{opacity:0;pointer-events:none}
  #loading .tri{width:46px;height:46px;border:2px solid var(--gold);
    clip-path:polygon(50% 0,100% 100%,0 100%);animation:pulse 1.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
  #loading .txt{font-size:11px;letter-spacing:.4em;text-transform:uppercase;color:var(--ink-dim)}
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="app">
  <canvas id="c"></canvas>
  <div id="vignette"></div>

  <div class="hud" id="title">
    <h1>TRIUMPH <b>660</b> · MOTEUR</h1>
    <p>Trois cylindres en ligne — éclaté cinématique</p>
    <div class="rule"></div>
    <a href="index.html">← Retour à la Daytona complète</a>
  </div>

  <div class="hud" id="help">
    <div class="pill"><span class="key">⇆</span> Rotation du bloc</div>
    <div class="pill"><span class="key">⇅</span> Séparer / réassembler</div>
    <div class="pill"><span class="key">⊙</span> Molette : zoom</div>
    <div class="pill"><span class="key">2×</span> Double-clic : réinitialiser</div>
  </div>

  <div class="hud" id="readout">
    <div class="big"><b id="pct">0</b> %</div>
    <div class="sub">séparation · <span id="npieces">0</span> pièces</div>
  </div>

  <div id="btns">
    <button id="bExplode">Vue éclatée</button>
    <button id="bCinema">Mode cinéma</button>
    <button id="bRotate" class="on">Rotation auto</button>
    <button id="bReset">Réinitialiser</button>
  </div>

  <div id="slider">
    <div class="lab">Éclaté</div>
    <div class="track" id="track">
      <div class="fill" id="fill" style="height:0%"></div>
      <div class="knob" id="knob" style="bottom:0%"></div>
    </div>
  </div>

  <div id="tip"><b id="tipName"></b><div class="rep" id="tipRep"></div></div>

  <div id="card">
    <div class="x" id="cardX">×</div>
    <h3 id="cardName"></h3>
    <div class="rep" id="cardRep"></div>
    <p id="cardDesc"></p>
    <div class="mat" id="cardMat"></div>
  </div>

  <div class="bar" id="barTop"></div>
  <div class="bar" id="barBot"></div>
  <div id="cineTitle">Triumph 660 — anatomie d'un trois cylindres</div>
  <div id="cineStop"><button id="bStop">■ Quitter le mode cinéma</button></div>

  <div id="loading"><div class="tri"></div><div class="txt">Assemblage du moteur…</div></div>
</div>

<script type="module">
import * as THREE from 'three';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { BokehPass } from 'three/addons/postprocessing/BokehPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
import { buildMoteur660 } from './js/moteur660.js';

/* ============================================================
   Constantes générales
   ============================================================ */
const rad = d => d*Math.PI/180;
const CANT = rad(12);                                  // inclinaison avant des cylindres
const BORE = new THREE.Vector3(0, Math.cos(CANT), -Math.sin(CANT)); // axe des fûts
const TILT = new THREE.Euler(-CANT, 0, 0);
const BORE_X = [-0.088, 0, 0.088];                     // entraxe des 3 cylindres
const CRANK_R = 0.0255, ROD_L = 0.102;                 // demi-course & longueur bielle

// point sur l'axe des fûts : distance d le long de l'axe, décalages locaux xl/zl
function bp(d, zl=0, xl=0){
  const v = new THREE.Vector3(xl, d, zl);
  v.applyEuler(TILT);
  return v;
}

/* ============================================================
   Rendu
   ============================================================ */
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050507);
scene.fog = new THREE.Fog(0x050507, 2.6, 7.5);

const camera = new THREE.PerspectiveCamera(38, innerWidth/innerHeight, 0.05, 40);
const TARGET = new THREE.Vector3(0, 0.04, 0);

const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(renderer), 0.04).texture;

// éclairage studio
const key = new THREE.DirectionalLight(0xfff0dd, 2.4);
key.position.set(1.5, 2.1, 1.1);
key.castShadow = true;
key.shadow.mapSize.set(2048, 2048);
key.shadow.camera.left = key.shadow.camera.bottom = -1.4;
key.shadow.camera.right = key.shadow.camera.top = 1.4;
key.shadow.camera.far = 8;
key.shadow.bias = -0.0004;
key.shadow.radius = 5;
scene.add(key);

const rim = new THREE.SpotLight(0x9fc0ff, 15, 12, rad(24), 0.8);
rim.position.set(-2.6, 3.2, -2.4);
scene.add(rim); rim.target.position.set(0,0.25,0); scene.add(rim.target);

const under = new THREE.PointLight(0xd4af37, 0.35, 1.1);
under.position.set(0.1, -0.18, 0.22);
scene.add(under);

const hemi = new THREE.HemisphereLight(0x666b74, 0x17181c, 0.55);
scene.add(hemi);
const fill = new THREE.DirectionalLight(0x9aa8c4, 1.1);
fill.position.set(-1.2, 1.0, 2.4);
scene.add(fill);
const fill2 = new THREE.DirectionalLight(0xc9b691, 0.9);
fill2.position.set(1.6, 0.4, -2.0);
scene.add(fill2);

/* ---------- décor : sol + cyclorama ---------- */
function radialFadeTex(inner='#101116', outer='#050507'){
  const c = document.createElement('canvas'); c.width = c.height = 512;
  const g = c.getContext('2d');
  const gr = g.createRadialGradient(256,256,40, 256,256,256);
  gr.addColorStop(0, inner); gr.addColorStop(1, outer);
  g.fillStyle = gr; g.fillRect(0,0,512,512);
  const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace;
  return t;
}
const FLOOR_Y = -0.315;
const floor = new THREE.Mesh(
  new THREE.CircleGeometry(4.5, 72),
  new THREE.MeshPhysicalMaterial({
    map: radialFadeTex('#15151a','#050507'),
    color:0xffffff, metalness:0.55, roughness:0.55, envMapIntensity:0.3
  })
);
floor.rotation.x = -Math.PI/2;
floor.position.y = FLOOR_Y;
floor.receiveShadow = true;
scene.add(floor);

// halo lumineux derrière le moteur
const glow = new THREE.Mesh(
  new THREE.PlaneGeometry(7,4.6),
  new THREE.MeshBasicMaterial({map:radialFadeTex('#1a1c26','#050507'), fog:false})
);
glow.position.set(0, 0.6, -3.4);
scene.add(glow);

/* ============================================================
   Textures procédurales & matériaux
   ============================================================ */
function noiseTex(size, contrast=28, blur=0){
  const c = document.createElement('canvas'); c.width = c.height = size;
  const g = c.getContext('2d');
  const img = g.createImageData(size, size);
  for(let i=0;i<img.data.length;i+=4){
    const v = 128 + (Math.random()-0.5)*2*contrast;
    img.data[i]=img.data[i+1]=img.data[i+2]=v; img.data[i+3]=255;
  }
  g.putImageData(img,0,0);
  if(blur){ g.filter = `blur(${blur}px)`; g.drawImage(c,0,0); g.filter='none'; }
  const t = new THREE.CanvasTexture(c);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  return t;
}
/* support d'atelier : deux planches veinées + cales moquette (photos) */
{
  // texture de bois : veines longitudinales irrégulières + nœuds
  const wc = document.createElement('canvas'); wc.width = 512; wc.height = 256;
  const wg = wc.getContext('2d');
  wg.fillStyle = '#6e5941'; wg.fillRect(0,0,512,256);
  for(let y=0; y<256; y+=2){
    const v = 0.75 + 0.25*Math.sin(y*0.6) + (Math.random()-0.5)*0.25;
    wg.fillStyle = `rgba(58,42,26,${Math.max(0, 0.5-(v*0.5)).toFixed(3)})`;
    wg.fillRect(0, y, 512, 1 + Math.random()*2);
  }
  for(let k=0;k<4;k++){ // nœuds
    const kx = 60+Math.random()*400, ky = 40+Math.random()*180;
    for(let rr=9; rr>0; rr-=2){
      wg.strokeStyle = `rgba(48,34,20,${(0.4-rr*0.03).toFixed(2)})`;
      wg.beginPath(); wg.ellipse(kx, ky, rr*2.2, rr, 0.2, 0, Math.PI*2); wg.stroke();
    }
  }
  const woodMap = new THREE.CanvasTexture(wc); woodMap.colorSpace = THREE.SRGBColorSpace;
  woodMap.wrapS = woodMap.wrapT = THREE.RepeatWrapping;
  const wood = new THREE.MeshPhysicalMaterial({map:woodMap, color:0xb9a284, metalness:0, roughness:0.86, bumpMap:woodMap, bumpScale:0.8});
  const carpet = new THREE.MeshPhysicalMaterial({color:0x1c1c1f, metalness:0, roughness:1, bumpMap:noiseTex(128, 50), bumpScale:2.4});
  const stand = new THREE.Group();
  for(const z of [-0.062, 0.062]){
    const plank = new THREE.Mesh(new RoundedBoxGeometry(0.52, 0.026, 0.115, 2, 0.003), wood);
    plank.position.set(0, -0.228, z);
    plank.castShadow = plank.receiveShadow = true; stand.add(plank);
  }
  for(const x of [-0.17, 0.17]){
    const blk = new THREE.Mesh(new RoundedBoxGeometry(0.15, 0.075, 0.3, 2, 0.006), carpet);
    blk.position.set(x, -0.2755, 0); blk.castShadow = blk.receiveShadow = true; stand.add(blk);
  }
  scene.add(stand);
}
/* ── moteur assemblé depuis le module partagé js/moteur660.js
   (source unique de la géométrie, également utilisée par index.html) ── */
const { group: engine, parts: rawParts } = buildMoteur660();
scene.add(engine);
const PARTS = rawParts.map((p, i) => {
  p.g.traverse(o => { if (o.isMesh) o.userData.pi = i; });
  return {
    g: p.g, name: p.name, rep: p.rep, desc: p.desc, matName: p.mat,
    dir: new THREE.Vector3(...p.dir).normalize(), dist: p.dist * 0.85, stag: p.stag,
    base: p.g.position.clone(), baseRot: p.g.rotation.clone(), spin: p.spin || null
  };
});

const easeC = t => t<0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
const RISE = 0.45; // le bloc lévite au-dessus du support pendant la séparation
let exploded = 0; // 0..1
function applyExplode(T){
  exploded = T;
  const rise = easeC(Math.min(1, T*1.35))*RISE;
  engine.position.y = rise;
  TARGET.y = 0.04 + rise*1.2;
  for(const p of PARTS){
    const k = Math.min(Math.max((T*1.7 - p.stag)/1.05, 0), 1);
    const e = easeC(k);
    p.g.position.copy(p.base).addScaledVector(p.dir, p.dist*e);
    if(p.spin){
      p.g.rotation.copy(p.baseRot);
      if(p.spin[0]==='x') p.g.rotation.x += e*p.spin[1]*Math.PI*2;
      if(p.spin[0]==='y') p.g.rotation.y += e*p.spin[1]*Math.PI*2;
    }
    // écartement interne (disques d'embrayage, coussinets…)
    p.g.traverse(o=>{
      if(o.userData && o.userData.spread !== undefined){
        o.position.x = o.userData.bx + e*o.userData.spread;
      }
    });
  }
  document.getElementById('pct').textContent = Math.round(T*100);
  document.getElementById('fill').style.height = (T*100)+'%';
  document.getElementById('knob').style.bottom = (T*100)+'%';
}

/* ============================================================
   Fin de construction
   ============================================================ */
document.getElementById('npieces').textContent = PARTS.length;
applyExplode(0);

/* ============================================================
   Post-traitement : bloom + bokeh + grain
   ============================================================ */
const PR = Math.min(devicePixelRatio, 2);
const composer = new EffectComposer(renderer, new THREE.WebGLRenderTarget(innerWidth*PR, innerHeight*PR, {type:THREE.HalfFloatType, samples:4}));
composer.addPass(new RenderPass(scene, camera));
const bokeh = new BokehPass(scene, camera, {focus:1.2, aperture:0.00012, maxblur:0.008});
bokeh.enabled = false;
composer.addPass(bokeh);
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.32, 0.55, 0.82);
composer.addPass(bloom);
const grainShader = {
  uniforms:{ tDiffuse:{value:null}, time:{value:0}, amount:{value:0.045} },
  vertexShader:`varying vec2 vUv; void main(){ vUv = uv; gl_Position = projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader:`
    uniform sampler2D tDiffuse; uniform float time; uniform float amount;
    varying vec2 vUv;
    float rnd(vec2 co){ return fract(sin(dot(co, vec2(12.9898,78.233))+time)*43758.5453); }
    void main(){
      vec4 c = texture2D(tDiffuse, vUv);
      c.rgb += (rnd(vUv)-0.5)*amount;
      float d = distance(vUv, vec2(0.5));
      c.rgb *= 1.0 - smoothstep(0.4, 0.95, d);
      gl_FragColor = c;
    }`
};
const grain = new ShaderPass(grainShader);
composer.addPass(grain);
composer.addPass(new OutputPass()); // applique ACES + conversion sRGB (obligatoire depuis r152)

/* ============================================================
   Caméra orbitale & interactions
   ============================================================ */
const view = { az:rad(-38), pol:rad(72), r:1.25, azV:0, autoRot:true };
const HOME = {...view};
function applyCamera(){
  const sp = Math.sin(view.pol), cp = Math.cos(view.pol);
  camera.position.set(
    TARGET.x + view.r*sp*Math.sin(view.az),
    TARGET.y + view.r*cp,
    TARGET.z + view.r*sp*Math.cos(view.az)
  );
  camera.lookAt(TARGET);
  // plateau tournant : la rampe clé / contre-jour suit l'azimut de la caméra
  const kAz = view.az + rad(42);
  key.position.set(Math.sin(kAz)*2.0, 2.1, Math.cos(kAz)*2.0);
  const rAz = view.az + rad(205);
  rim.position.set(Math.sin(rAz)*2.9, 3.2, Math.cos(rAz)*2.9);
  const fAz = view.az - rad(35);
  fill2.position.set(Math.sin(fAz)*2.0, 0.5, Math.cos(fAz)*2.0);
}

let dragging = false, moved = 0, px = 0, py = 0;
canvas.addEventListener('pointerdown', e=>{
  if(cinema.on) return;
  dragging = true; moved = 0; px = e.clientX; py = e.clientY;
  canvas.classList.add('dragging');
  canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointermove', e=>{
  if(dragging && !cinema.on){
    const dx = e.clientX-px, dy = e.clientY-py;
    px = e.clientX; py = e.clientY;
    moved += Math.abs(dx)+Math.abs(dy);
    view.az -= dx*0.006;
    view.autoRot = false; btnRot.classList.remove('on');
    applyExplode(Math.min(1, Math.max(0, exploded + dy*0.0028)));
  }
  hoverAt(e.clientX, e.clientY);
});
addEventListener('pointerup', e=>{
  if(dragging && moved < 6) clickAt(e.clientX, e.clientY);
  dragging = false;
  canvas.classList.remove('dragging');
});
canvas.addEventListener('wheel', e=>{
  if(cinema.on) return;
  e.preventDefault();
  view.r = Math.min(2.6, Math.max(0.55, view.r * (1 + e.deltaY*0.0011)));
}, {passive:false});
canvas.addEventListener('dblclick', ()=>{ if(!cinema.on) resetView(); });

function resetView(){
  Object.assign(view, HOME);
  view.autoRot = true; btnRot.classList.add('on');
  explodeAnim = null;
  document.getElementById('bExplode').classList.remove('on');
  applyExplode(0);
  hideCard();
}

/* curseur vertical */
const track = document.getElementById('track');
let sliding = false;
function trackSet(e){
  const r = track.getBoundingClientRect();
  applyExplode(Math.min(1, Math.max(0, 1 - (e.clientY - r.top)/r.height)));
}
track.addEventListener('pointerdown', e=>{ sliding = true; trackSet(e); track.setPointerCapture(e.pointerId); });
track.addEventListener('pointermove', e=>{ if(sliding) trackSet(e); });
addEventListener('pointerup', ()=> sliding = false);

/* boutons */
const btnRot = document.getElementById('bRotate');
document.getElementById('bExplode').addEventListener('click', function(){
  const target = exploded > 0.5 ? 0 : 1;
  this.classList.toggle('on', target === 1);
  animateExplode(target);
});
btnRot.addEventListener('click', function(){
  view.autoRot = !view.autoRot;
  this.classList.toggle('on', view.autoRot);
});
document.getElementById('bReset').addEventListener('click', resetView);

let explodeAnim = null;
function animateExplode(to, dur=2400){
  const from = exploded, t0 = performance.now();
  explodeAnim = (now)=>{
    const k = Math.min(1, (now-t0)/dur);
    applyExplode(from + (to-from)*easeC(k));
    if(k>=1) explodeAnim = null;
  };
}

/* survol & sélection */
const ray = new THREE.Raycaster();
const ptr = new THREE.Vector2();
const tip = document.getElementById('tip');
let hovered = -1;
function pickPart(x, y){
  ptr.set(x/innerWidth*2-1, -(y/innerHeight)*2+1);
  ray.setFromCamera(ptr, camera);
  const hits = ray.intersectObjects(engine.children, true);
  for(const h of hits){
    if(h.object.userData.pi !== undefined) return h.object.userData.pi;
  }
  return -1;
}
function setHover(pi){
  if(pi === hovered) return;
  if(hovered >= 0){
    PARTS[hovered].g.traverse(o=>{
      if(o.isMesh && o.userData.om){ o.material.dispose(); o.material = o.userData.om; delete o.userData.om; }
    });
  }
  hovered = pi;
  if(pi >= 0){
    PARTS[pi].g.traverse(o=>{
      if(o.isMesh){
        o.userData.om = o.material;
        o.material = o.material.clone();
        o.material.emissive = new THREE.Color(0xd4af37);
        o.material.emissiveIntensity = 0.14;
      }
    });
  }
}
function hoverAt(x, y){
  if(cinema.on || dragging){ tip.style.opacity = 0; return; }
  const pi = pickPart(x, y);
  setHover(pi);
  if(pi >= 0){
    tip.style.opacity = 1;
    tip.style.left = x+'px'; tip.style.top = y+'px';
    document.getElementById('tipName').textContent = PARTS[pi].name;
    document.getElementById('tipRep').textContent = PARTS[pi].rep;
    canvas.style.cursor = 'pointer';
  } else {
    tip.style.opacity = 0;
    canvas.style.cursor = dragging ? 'grabbing' : 'grab';
  }
}
const card = document.getElementById('card');
function clickAt(x, y){
  if(cinema.on) return;
  const pi = pickPart(x, y);
  if(pi < 0){ hideCard(); return; }
  const p = PARTS[pi];
  document.getElementById('cardName').textContent = p.name;
  document.getElementById('cardRep').textContent = p.rep + ' · microfiche carter moteur';
  document.getElementById('cardDesc').textContent = p.desc;
  document.getElementById('cardMat').innerHTML = p.matName ? '<b>Matière :</b> ' + p.matName : '';
  card.classList.add('show');
}
function hideCard(){ card.classList.remove('show'); }
document.getElementById('cardX').addEventListener('click', hideCard);

/* ============================================================
   Mode cinéma — plan-séquence choréographié
   ============================================================ */
const cinema = { on:false, t0:0, dur:27 };
const lerp = (a,b,t)=>a+(b-a)*t;
const sstep = (a,b,t)=>{ const k = Math.min(1, Math.max(0, (t-a)/(b-a))); return k*k*(3-2*k); };

function cineFrame(t){
  // t en secondes depuis le début
  let az, pol, r, T;
  if(t < 4){                       // héro assemblé, orbite lente serrée sur l'embrayage
    const k = t/4;
    az = lerp(rad(55), rad(85), k); pol = rad(80); r = lerp(0.82, 0.9, k); T = 0;
  } else if(t < 6){                // recul
    const k = sstep(4, 6, t);
    az = lerp(rad(85), rad(95), k); pol = lerp(rad(80), rad(64), k); r = lerp(0.9, 1.45, k); T = 0;
  } else if(t < 14){               // LA séparation
    const k = sstep(6, 13.5, t);
    az = lerp(rad(95), rad(235), sstep(6, 14, t));
    pol = lerp(rad(64), rad(60), k);
    r = lerp(1.45, 2.25, k);
    T = k;
  } else if(t < 19.5){             // dérive contemplative dans le nuage de pièces
    const k = sstep(14, 19.5, t);
    az = lerp(rad(235), rad(300), k); pol = lerp(rad(60), rad(70), k);
    r = lerp(2.25, 2.0, k); T = 1;
  } else if(t < 25){               // réassemblage
    const k = sstep(19.5, 24.5, t);
    az = lerp(rad(300), rad(395), k); pol = lerp(rad(70), rad(74), k);
    r = lerp(2.0, 1.15, k); T = 1 - k;
  } else {                         // héro final
    az = rad(395 + (t-25)*4); pol = rad(74); r = 1.15; T = 0;
  }
  view.az = az; view.pol = pol; view.r = r;
  applyExplode(T);
  bokeh.uniforms['focus'].value = r;
}
function startCinema(){
  cinema.on = true; cinema.t0 = performance.now()/1000;
  document.body.classList.add('cinema');
  bokeh.enabled = true;
  grain.uniforms.amount.value = 0.07;
  explodeAnim = null;
  setHover(-1);
  hideCard(); tip.style.opacity = 0;
}
function stopCinema(){
  cinema.on = false;
  document.body.classList.remove('cinema');
  bokeh.enabled = false;
  grain.uniforms.amount.value = 0.045;
  TARGET.y = 0.04;
  resetView();
}
document.getElementById('bCinema').addEventListener('click', startCinema);
document.getElementById('bStop').addEventListener('click', stopCinema);
addEventListener('keydown', e=>{ if(e.key === 'Escape' && cinema.on) stopCinema(); });

/* ============================================================
   Boucle de rendu
   ============================================================ */
let lastT = performance.now();
function loop(now){
  requestAnimationFrame(loop);
  const dt = Math.min(0.1, (now-lastT)/1000); lastT = now;
  if(cinema.on){
    const t = now/1000 - cinema.t0;
    if(t >= cinema.dur) stopCinema(); else cineFrame(t);
  } else {
    if(view.autoRot && !dragging) view.az += dt*0.12;
    if(explodeAnim) explodeAnim(now);
  }
  applyCamera();
  grain.uniforms.time.value = now/1000 % 100;
  composer.render();
}
requestAnimationFrame(loop);
document.getElementById('loading').classList.add('done');

addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});

/* hook de debug */
window.moteur = {
  set(az, T, r){ if(az!==undefined) view.az = az; if(T!==undefined) applyExplode(T); if(r!==undefined) view.r = r; view.autoRot = false; },
  cinema: startCinema,
  parts: PARTS
};
</script>
</body>
